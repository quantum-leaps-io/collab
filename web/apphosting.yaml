runConfig:
  runtime: nodejs20
  concurrency: 100
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0

# NEXT_PUBLIC_* vars are embedded in the browser bundle — plain values, not secrets
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDzTGAK8YcvhLY1shBLGdBykYiQsKTzyiI
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: collab-24f83.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: collab-24f83
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: collab-24f83.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1043647327094"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1043647327094:web:831743a64ecb64654ea857
    availability:
      - BUILD
      - RUNTIME
